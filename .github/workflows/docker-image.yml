name: Docker Image CI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag
        required: true
        default: manual

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.event.release.tag_name || inputs.tag }}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/nyaai-server:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER_LC }}/nyaai-server:latest

      - name: Build and push web
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/nyaai-web:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER_LC }}/nyaai-web:latest

name: Docker Image CI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Set image tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/nyaai-server:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/nyaai-server:latest

      - name: Build and push web
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/nyaai-web:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/nyaai-web:latest

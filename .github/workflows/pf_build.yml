name: Docker Image CI PF

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: true
        default: 'manual'

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # 阶段一：架构分别构建
  # ==========================================
  build:
    name: Build ${{ matrix.component }} on ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        component: [server, web]
        platform:
          - runner: ubuntu-latest
            arch: amd64
          # 启用 GitHub 原生 ARM Runner
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Prepare variables
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.event.release.tag_name || inputs.tag }}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by architecture
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile.${{ matrix.component }}
          # 只构建当前原生架构，不再使用 QEMU 跨架构
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          # 打上带有架构后缀的临时标签，例如 my-image:v1.0-amd64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/nyaai-${{ matrix.component }}:${{ env.IMAGE_TAG }}-${{ matrix.platform.arch }}
          cache-from: type=gha,scope=build-${{ matrix.component }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.component }}-${{ matrix.platform.arch }}

  # ==========================================
  # 阶段二：合并镜像清单 (Manifest Merge)
  # ==========================================
  merge:
    name: Merge Manifests for ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: build # 必须等待构建完成
    strategy:
      fail-fast: false
      matrix:
        component: [server, web]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Prepare variables
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.event.release.tag_name || inputs.tag }}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        # 将之前带后缀的 amd64 和 arm64 镜像，合并成最终不带后缀的标签
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER_LC }}/nyaai-${{ matrix.component }}:${{ env.IMAGE_TAG }} \
            -t ghcr.io/${{ env.OWNER_LC }}/nyaai-${{ matrix.component }}:latest \
            ghcr.io/${{ env.OWNER_LC }}/nyaai-${{ matrix.component }}:${{ env.IMAGE_TAG }}-amd64 \
            ghcr.io/${{ env.OWNER_LC }}/nyaai-${{ matrix.component }}:${{ env.IMAGE_TAG }}-arm64
